name: 🔐 Security CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/security-ci.yml"
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USER }}/teshlex-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USER }}/teshlex-frontend
  NODE_VERSION: 20

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 🔐 SCAN: Detectar vulnerabilidades en código
  # ──────────────────────────────────────────────────────────────────────────
  security-scan:
    name: 🔍 Security & SAST Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: 🔍 Run Trivy vulnerability scanner (code)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: 📤 Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      # Optional: SonarQube scan
      - name: 🔍 Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────────
  # 🏗️ BUILD: Backend Docker image
  # ──────────────────────────────────────────────────────────────────────────
  build-backend:
    name: 🐳 Build Backend Image
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: 🔑 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          outputs: type=docker,dest=/tmp/backend-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📤 Upload Backend image for scanning
        uses: actions/upload-artifact@v3
        with:
          name: backend-image
          path: /tmp/backend-image.tar
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────
  # 🏗️ BUILD: Frontend Docker image
  # ──────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: 🐳 Build Frontend Image
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: 🔑 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          outputs: type=docker,dest=/tmp/frontend-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📤 Upload Frontend image for scanning
        uses: actions/upload-artifact@v3
        with:
          name: frontend-image
          path: /tmp/frontend-image.tar
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────
  # 🔒 SCAN: Docker images with Trivy (bloquear CRITICAL/HIGH)
  # ──────────────────────────────────────────────────────────────────────────
  scan-backend-image:
    name: 🔐 Scan Backend Docker Image
    runs-on: ubuntu-latest
    needs: build-backend
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: backend-image
          path: /tmp

      - name: 📥 Load Backend image
        run: |
          docker load --input /tmp/backend-image.tar
          docker image ls

      - name: 🔍 Scan Backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          input: "/tmp/backend-image.tar"
          format: "table"
          severity: "CRITICAL,HIGH,MEDIUM"

      - name: 🔍 Scan Backend image with Trivy (strict mode)
        uses: aquasecurity/trivy-action@master
        with:
          input: "/tmp/backend-image.tar"
          format: "sarif"
          output: "trivy-backend.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1" # ❌ Fallar si encuentra CRITICAL/HIGH

      - name: 📤 Upload SARIF
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: "trivy-backend.sarif"

  scan-frontend-image:
    name: 🔐 Scan Frontend Docker Image
    runs-on: ubuntu-latest
    needs: build-frontend
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: frontend-image
          path: /tmp

      - name: 📥 Load Frontend image
        run: |
          docker load --input /tmp/frontend-image.tar
          docker image ls

      - name: 🔍 Scan Frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          input: "/tmp/frontend-image.tar"
          format: "table"
          severity: "CRITICAL,HIGH,MEDIUM"

      - name: 🔍 Scan Frontend image (strict)
        uses: aquasecurity/trivy-action@master
        with:
          input: "/tmp/frontend-image.tar"
          format: "sarif"
          output: "trivy-frontend.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: 📤 Upload SARIF
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: "trivy-frontend.sarif"

  # ──────────────────────────────────────────────────────────────────────────
  # 📤 PUSH: Images a Docker Hub si pasa todos los scans
  # ──────────────────────────────────────────────────────────────────────────
  push-images:
    name: 📤 Push Images to Registry
    runs-on: ubuntu-latest
    needs:
      - scan-backend-image
      - scan-frontend-image
    if: github.ref == 'refs/heads/main' # Solo en main
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: 🔑 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🐳 Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🐳 Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # 🚀 DEPLOY: a k3s (opcional, si tienes acceso)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-k3s:
    name: 🚀 Deploy to k3s
    runs-on: ubuntu-latest
    needs: push-images
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: 📋 Update K8s Manifests with new image tags
        run: |
          sed -i "s|DOCKERHUB_USER/teshlex-backend:latest|${{ env.BACKEND_IMAGE }}:${{ github.sha }}|g" k8s/deployment.yaml
          sed -i "s|DOCKERHUB_USER/teshlex-frontend:latest|${{ env.FRONTEND_IMAGE }}:${{ github.sha }}|g" k8s/deployment.yaml

      - name: 🔐 Configure kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.28"

      - name: 📡 Setup kubeconfig from secret
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: 🚀 Apply K8s manifests
        run: |
          kubectl apply -f k8s/network-policy.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml || true

      - name: ⏳ Wait for rollout
        run: |
          kubectl rollout status deployment/teshlex-backend -n default --timeout=5m
          kubectl rollout status deployment/teshlex-frontend -n default --timeout=5m

      - name: ✅ Verify deployment
        run: |
          kubectl get pods -n default
          kubectl get svc -n default

      - name: 🔍 Health check
        run: |
          for i in {1..30}; do
            if curl -f http://localhost/api/health; then
              echo "✅ Service is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Service health check failed"
          exit 1

  # ──────────────────────────────────────────────────────────────────────────
  # 📊 REPORT: Resumen de seguridad
  # ──────────────────────────────────────────────────────────────────────────
  security-report:
    name: 📊 Security Report
    runs-on: ubuntu-latest
    needs:
      - security-scan
      - scan-backend-image
      - scan-frontend-image
    if: always()
    steps:
      - name: 📋 Generate security report
        run: |
          echo "# 🔐 Security CI/CD Report"
          echo ""
          echo "## Workflow Status "
          echo "- Security Scan: ${{ needs.security-scan.result }}"
          echo "- Backend Image Scan: ${{ needs.scan-backend-image.result }}"
          echo "- Frontend Image Scan: ${{ needs.scan-frontend-image.result }}"
          echo ""
          echo "## Summary"
          echo "- Repository: ${{ github.repository }}"
          echo "- Commit: ${{ github.sha }}"
          echo "- Branch: ${{ github.ref_name }}"
          echo "- Time: $(date)"

      - name: 🔴 Fail if scans failed
        if: |
          needs.security-scan.result == 'failure' ||
          needs.scan-backend-image.result == 'failure' ||
          needs.scan-frontend-image.result == 'failure'
        run: |
          echo "❌ Security checks failed"
          exit 1
