# ============================================================
# TeshLex — Nginx Configuration (Hardened)
# Ubicación: /etc/nginx/sites-available/teshlex
# Link: ln -s /etc/nginx/sites-available/teshlex /etc/nginx/sites-enabled/
# ============================================================

# 🔐 Rate Limiting Maps
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=general_zone:10m rate=60r/s;

# ============================================================
# HTTP → HTTPS redirect (port 80)
# ============================================================
server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  # Allow ACME Let's Encrypt validation only
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Redirect all other traffic to HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

# ============================================================
# HTTPS Reverse Proxy (port 443)
# ============================================================
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;

  server_name teshlex.local teshlex.com www.teshlex.com;

  # 🔐 SSL/TLS Certificates (Let's Encrypt)
  ssl_certificate /etc/letsencrypt/live/teshlex.local/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/teshlex.local/privkey.pem;

  # Modern SSL/TLS configuration
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;
  ssl_stapling on;
  ssl_stapling_verify on;

  # 🔐 Security Headers
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'nonce-uniquenonce'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; frame-ancestors 'none';" always;

  # ============================================================
  # Backend API Proxy (http://localhost:3000)
  # ============================================================
  location /api/ {
    # 🛡️ Rate limiting por endpoint
    limit_req zone=api_zone burst=50 nodelay;

    # 🔐 Proxy headers
    proxy_pass http://localhost:3000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;

    # Connection handling
    proxy_set_header Connection "upgrade";
    proxy_set_header Upgrade $http_upgrade;
    proxy_buffering off;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Custom error pages
    proxy_intercept_errors on;
  }

  # ============================================================
  # Health Check (public, rate limited loosely)
  # ============================================================
  location /api/health {
    limit_req zone=general_zone burst=100 nodelay;

    proxy_pass http://localhost:3000;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;

    access_log off;  # No logueo de health checks
  }

  # ============================================================
  # Auth Endpoints (strict rate limiting)
  # ============================================================
  location /api/auth/login {
    limit_req zone=login_zone burst=2 nodelay;

    proxy_pass http://localhost:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/auth/refresh {
    limit_req zone=login_zone burst=5 nodelay;

    proxy_pass http://localhost:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ============================================================
  # Static Files / Frontend (Vite)
  # ============================================================
  location / {
    root /var/www/teshlex-frontend;
    index index.html;

    # SPA routing — cualquier 404 → index.html
    try_files $uri $uri/ /index.html;

    # Cache control para assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      expires 7d;
      add_header Cache-Control "public, immutable";
    }

    # HTML no cachear (siempre chequear nuevas versiones)
    location ~* \.html?$ {
      expires -1;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
  }

  # ============================================================
  # 🚫 Bloquear acceso a archivos sensibles
  # ============================================================
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }

  location ~ ~$ {
    deny all;
    access_log off;
    log_not_found off;
  }

  # Bloquear .env, .git, etc
  location ~ /\.(env|git|htaccess|ssh) {
    deny all;
  }

  # ============================================================
  # Swagger/Docs — solo en dev (si está habilitado)
  # ============================================================
  location /api/docs {
    # Reemplazar por tu IP en producción o deshabilitar
    allow 127.0.0.1;
    deny all;

    proxy_pass http://localhost:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # ============================================================
  # Logging
  # ============================================================
  access_log /var/log/nginx/teshlex-access.log combined buffer=32k flush=5s;
  error_log /var/log/nginx/teshlex-error.log warn;

  # ============================================================
  # Gzip Compression (texto, JS, CSS — NO imágenes)
  # ============================================================
  gzip on;
  gzip_vary on;
  gzip_min_length 1000;
  gzip_proxied any;
  gzip_types text/plain text/css text/xml text/javascript
             application/x-javascript application/xml+rss
             application/javascript application/json;
  gzip_disable "MSIE [1-6]\.";
  gzip_comp_level 6;
}
