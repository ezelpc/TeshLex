# .devcontainer/prometheus/prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: teshlex
    environment: development

scrape_configs:
  - job_name: teshlex-backend
    static_configs:
      - targets: ["teshlex-dev:3000"]
    metrics_path: /api/metrics

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node-exporter
    static_configs:
      - targets: ["teshlex-dev:9100"]